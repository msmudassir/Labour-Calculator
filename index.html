<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>
    Labour Calculator
  </title>

  <!-- Bootstrap -->

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <!-- Icons -->

  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
  />

  <!-- CSS -->

  <link rel="stylesheet" href="style.css" />

</head>

<body>

  <div class="container py-4">

    <div class="main-card">

      <!-- TOP SECTION -->

      <div class="top-section">

        <div class="truck-icon">
          <i class="bi bi-truck"></i>
        </div>

        <h1>
          Labour Calculator
        </h1>

        <p>
          Cement Loading & Unloading Management
   
        </p>

      </div>

      <!-- CONTENT -->

      <div class="content-section">

        <!-- TON -->

        <div class="mb-4">

          <label class="section-title">
            Truck Ton
          </label>

          <div class="d-flex gap-2 flex-wrap mb-3">

            <button
              class="btn ton-btn"
              onclick="setTon(17)"
            >
              17 Ton
            </button>

            <button
              class="btn ton-btn"
              onclick="setTon(20)"
            >
              20 Ton
            </button>

            <button
              class="btn ton-btn active-ton"
              onclick="setTon(25)"
            >
              25 Ton
            </button>

          </div>

          <input
            type="number"
            id="ton"
            class="form-control custom-input"
            placeholder="Enter truck ton"
          />

        </div>

        <!-- RATES -->

        <div class="rate-box">

          <div class="row g-3">

            <div class="col-md-4">

              <label class="section-title">
                Loading ₹
              </label>

              <input
                type="number"
                id="loadingRate"
                class="form-control custom-input"
                value="4"
              />

            </div>

            <div class="col-md-4">

              <label class="section-title">
                Unloading ₹
              </label>

              <input
                type="number"
                id="unloadingRate"
                class="form-control custom-input"
                value="4"
              />

            </div>

            <div class="col-md-4">

              <label class="section-title">
                Both ₹
              </label>

              <input
                type="number"
                id="bothRate"
                class="form-control custom-input"
                value="8"
              />

            </div>

          </div>

        </div>

        <!-- LABOUR SECTION -->

        <div class="labour-section">

          <div
            class="d-flex justify-content-between align-items-center mb-3"
          >

            <h3 class="labour-title">
              Labour Entries
            </h3>

            <button
              class="btn add-btn"
              onclick="addLabourRow()"
            >

              <i class="bi bi-plus-lg"></i>
              Add Labour

            </button>

          </div>

          <div id="labourContainer"></div>

        </div>

        <!-- EXTRA BAG SECTION -->

        <div class="labour-section">

          <div
            class="d-flex justify-content-between align-items-center mb-3"
          >

            <h3 class="labour-title">
              Extra Bag Work
            </h3>

            <button
              class="btn add-btn"
              onclick="addExtraRow()"
            >

              <i class="bi bi-plus-lg"></i>
              Add Extra Work

            </button>

          </div>

          <!-- EXTRA RATES -->

          <div class="rate-box extra-rate-box">

            <div class="row g-3">

              <div class="col-md-4">

                <label class="section-title">
                  Loading ₹
                </label>

                <input
                  type="number"
                  id="extraLoadingRate"
                  class="form-control custom-input"
                  value="3"
                />

              </div>

              <div class="col-md-4">

                <label class="section-title">
                  Unloading ₹
                </label>

                <input
                  type="number"
                  id="extraUnloadingRate"
                  class="form-control custom-input"
                  value="3"
                />

              </div>

              <div class="col-md-4">

                <label class="section-title">
                  Both ₹
                </label>

                <input
                  type="number"
                  id="extraBothRate"
                  class="form-control custom-input"
                  value="6"
                />

              </div>

            </div>

          </div>

          <div id="extraContainer"></div>

        </div>

        <!-- BUTTON -->

        <button
          class="btn calculate-btn w-100"
          onclick="calculateTotals()"
        >

          <i class="bi bi-calculator"></i>
          Calculate Totals

        </button>

        <!-- RESULT -->

        <div class="result-card">

          <div class="result-header">

            <h3>
              Final Totals
            </h3>

            <span id="totalBags">
              0 Bags
            </span>

          </div>

          <div id="resultContainer">

            <div class="empty-text">
              Results will appear here
            </div>

          </div>

        </div>

        <!-- RESET -->

        <button
          class="btn reset-btn w-100"
          onclick="resetAll()"
        >
          Reset All
        </button>

      </div>

    </div>

  </div>

  <!-- JS -->

  <script src="script.js"></script>

</body>

</html>
